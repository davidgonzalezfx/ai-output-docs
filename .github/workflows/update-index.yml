name: Update Index

on:
  push:
    branches: [main]

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Regenerate index.html
        run: |
          python3 << 'PYEOF'
          import os
          import re

          # Collect all .html files at repo root, excluding index.html
          html_files = sorted([
              f for f in os.listdir('.')
              if f.endswith('.html') and f != 'index.html' and os.path.isfile(f)
          ])

          def get_title(filename):
              try:
                  with open(filename, 'r', encoding='utf-8', errors='ignore') as fh:
                      content = fh.read(8192)
                  match = re.search(r'<title[^>]*>([^<]+)</title>', content, re.IGNORECASE)
                  if match:
                      return match.group(1).strip()
              except Exception:
                  pass
              # Fallback: humanise the filename
              name = filename[:-5]  # strip .html
              name = name.replace('-', ' ').replace('_', ' ')
              return name.title()

          # Build replacement block
          if html_files:
              lines = []
              for i, filename in enumerate(html_files, 1):
                  title = get_title(filename)
                  lines.append(
                      f'        <a href="{filename}" class="toc-item">'
                      f'<span class="toc-num">{i:02d}</span>{title}</a>'
                  )
              items_block = '\n'.join(lines)
          else:
              items_block = (
                  '        <span class="empty-state">'
                  'NO REPORTS FOUND · ADD HTML FILES TO THE REPO ROOT</span>'
              )

          with open('index.html', 'r', encoding='utf-8') as fh:
              html = fh.read()

          updated = re.sub(
              r'<!-- REPORT_ITEMS_START -->.*?<!-- REPORT_ITEMS_END -->',
              f'<!-- REPORT_ITEMS_START -->\n{items_block}\n        <!-- REPORT_ITEMS_END -->',
              html,
              flags=re.DOTALL,
          )

          if updated == html:
              print('index.html is already up to date — nothing to commit.')
          else:
              with open('index.html', 'w', encoding='utf-8') as fh:
                  fh.write(updated)
              print(f'index.html updated with {len(html_files)} report(s).')
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet \
            && echo "Nothing to commit." \
            || git commit -m "chore: regenerate index.html [skip ci]" && git push
